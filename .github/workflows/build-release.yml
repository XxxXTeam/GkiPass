name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write
  packages: write

jobs:
  # 第一步：构建前端，产出 out/ 静态文件供后端嵌入
  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static export
        working-directory: web
        run: npx next build
        env:
          NODE_ENV: production

      # 上传 out/ 目录供后端 job 下载并嵌入
      - name: Upload frontend static files
        uses: actions/upload-artifact@v6
        with:
          name: frontend-out
          path: web/out/
          retention-days: 1

      # 同时打包完整前端产物供 release 下载
      - name: Package web build
        run: tar czf gkipass-web.tar.gz -C web/out .

      - name: Upload web release artifact
        uses: actions/upload-artifact@v6
        with:
          name: gkipass-web
          path: gkipass-web.tar.gz
          retention-days: 30

  # 第二步：后端构建，依赖前端产物（通过 go:embed 嵌入）
  build-backend:
    name: Build Backend Components
    needs: [build-web]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      # 下载前端构建产物到 plane/frontend/out/
      - name: Download frontend static files
        uses: actions/download-artifact@v7
        with:
          name: frontend-out
          path: plane/frontend/out

      - name: Get dependencies
        run: |
          go mod tidy
          cd client && go mod download

      - name: Build Plane (Server)
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build -ldflags="-s -w -X main.Version=$VERSION -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o bin/gkipass-plane-${{ matrix.target.suffix }} \
            plane/cmd/main.go

      - name: Build Client
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        working-directory: client
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build -ldflags="-s -w -X main.Version=$VERSION -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../bin/gkipass-client-${{ matrix.target.suffix }} \
            cmd/main.go

      - name: Package binaries
        run: |
          cd bin
          if [[ "${{ matrix.target.goos }}" == "windows" ]]; then
            zip gkipass-${{ matrix.target.suffix }}.zip gkipass-*-${{ matrix.target.suffix }}
          else
            tar czf gkipass-${{ matrix.target.suffix }}.tar.gz gkipass-*-${{ matrix.target.suffix }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: gkipass-${{ matrix.target.suffix }}
          path: bin/gkipass-${{ matrix.target.suffix }}.*
          retention-days: 30

  # 第三步：创建 Release
  create-release:
    name: Create GitHub Release
    needs: [build-backend, build-web]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h) - %an" --no-merges)
          else
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h) - %an" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## GKI Pass ${{ github.ref_name }}
            
            ### 下载
            
            | 平台 | 文件 |
            |------|------|
            | Linux (amd64) | gkipass-linux-amd64.tar.gz |
            | Linux (arm64) | gkipass-linux-arm64.tar.gz |
            | Windows (amd64) | gkipass-windows-amd64.exe.zip |
            | macOS (Intel) | gkipass-darwin-amd64.tar.gz |
            | macOS (Apple Silicon) | gkipass-darwin-arm64.tar.gz |
            | Web 前端 | gkipass-web.tar.gz |
            
            > 服务端二进制已内嵌前端静态文件，无需单独部署前端。
            
            ### 更新日志
            
            ${{ steps.changelog.outputs.changelog }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
